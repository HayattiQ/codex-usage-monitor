name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/cxusage dist/cxusage
          tar -czf cxusage-${{ matrix.target }}.tar.gz -C dist cxusage
          shasum -a 256 cxusage-${{ matrix.target }}.tar.gz > cxusage-${{ matrix.target }}.tar.gz.sha256
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            cxusage-${{ matrix.target }}.tar.gz
            cxusage-${{ matrix.target }}.tar.gz.sha256
